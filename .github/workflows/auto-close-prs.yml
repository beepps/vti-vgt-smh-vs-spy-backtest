name: Auto-close pull requests

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    name: Close pull request
    runs-on: ubuntu-latest
    steps:
      - name: Close pull request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const message = "This public portfolio repository does not accept external pull requests. Feel free to fork, clone, or use the code for your own reference, but changes will not be accepted here.";

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: message,
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              state: "closed",
            });
